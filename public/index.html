<!DOCTYPE html>
<html>
<head>
  <title>Reaction Game</title>
</head>
<body style="text-align:center; font-family:sans-serif;">

<h1>เกมคลิกให้ทัน</h1>

<input id="name" placeholder="ใส่ชื่อ">
<br><br>

<button onclick="startGame()">เริ่ม</button>

<h2 id="status"></h2>
<h3>คะแนน: <span id="score">0</span></h3>

<h2>อันดับ</h2>
<ul id="leaderboard"></ul>

<script>
let score = 0;
let playing = false;

function startGame() {
  score = 0;
  playing = true;
  document.getElementById("score").innerText = score;
  document.getElementById("status").innerText = "กดเร็ว!";
  setTimeout(endGame, 5000);
}

document.body.onclick = function() {
  if (playing) {
    score++;
    document.getElementById("score").innerText = score;
  }
};

function endGame() {
  playing = false;
  document.getElementById("status").innerText = "จบ!";

  const name = document.getElementById("name").value || "ผู้เล่น";

  fetch("/score", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name, score })
  })
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById("leaderboard");
    list.innerHTML = "";
    data.forEach(p => {
      const li = document.createElement("li");
      li.innerText = p.name + " - " + p.score;
      list.appendChild(li);
    });
  });
}
</script>

</body>
</html>
